<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 260" width="100%" height="260">
  <defs>
    <!-- Glowing filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes flicker {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 0.5; }
    }
    @keyframes blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    @keyframes radarPulse1 {
      0% { opacity: 0; }
      10% { opacity: 1; }
      60% { opacity: 0.1; }
      100% { opacity: 0; }
    }
    @keyframes radarPulse2 {
      0% { opacity: 0; }
      35% { opacity: 1; }
      85% { opacity: 0.1; }
      100% { opacity: 0; }
    }
    @keyframes radarPulse3 {
      0% { opacity: 0; }
      60% { opacity: 1; }
      90% { opacity: 0.1; }
      100% { opacity: 0; }
    }
    .g-glow { filter: url(#glow); }
    .g-glow-strong { filter: url(#glow-strong); }
    .pulse { animation: pulse 2s infinite ease-in-out; }
    .flicker { animation: flicker 3s infinite ease-in-out; }
    .blink { animation: blink 1s infinite steps(2, start); }
    .radar-sweep {
      transform-origin: 660px 130px;
      animation: rotate 6s infinite linear;
    }
    /* Timeline sync of bounty appearances with sweep rotation (6s total) */
    .bounty-node-1 { animation: radarPulse1 6s infinite linear; }
    .bounty-node-2 { animation: radarPulse2 6s infinite linear; }
    .bounty-node-3 { animation: radarPulse3 6s infinite linear; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#000a06" rx="16" />
  
  <!-- Subtle Grid -->
  <path d="M 0,26 L 830,26 M 0,52 L 830,52 M 0,78 L 830,78 M 0,104 L 830,104 M 0,130 L 830,130 M 0,156 L 830,156 M 0,182 L 830,182 M 0,208 L 830,208 M 0,234 L 830,234" stroke="#04180f" stroke-width="1" />
  <path d="M 83,0 L 83,260 M 166,0 L 166,260 M 249,0 L 249,260 M 332,0 L 332,260 M 415,0 L 415,260 M 498,0 L 498,260 M 581,0 L 581,260 M 664,0 L 664,260 M 747,0 L 747,260" stroke="#04180f" stroke-width="1" />

  <!-- Glowing diagonal lines / HUD elements -->
  <path d="M 16,16 L 40,16 M 16,16 L 16,40" stroke="#7affb4" stroke-width="2" fill="none" class="g-glow" />
  <path d="M 814,16 L 790,16 M 814,16 L 814,40" stroke="#7affb4" stroke-width="2" fill="none" class="g-glow" />
  <path d="M 16,244 L 40,244 M 16,244 L 16,220" stroke="#7affb4" stroke-width="2" fill="none" class="g-glow" />
  <path d="M 814,244 L 790,244 M 814,244 L 814,220" stroke="#7affb4" stroke-width="2" fill="none" class="g-glow" />

  <!-- Info panel (Left side) -->
  <g transform="translate(45, 45)">
    <!-- Brand Title -->
    <text x="0" y="24" fill="#7affb4" font-family="monospace, Courier New" font-size="22" font-weight="bold" letter-spacing="2" class="g-glow">BOUNTY HUB</text>
    <text x="0" y="44" fill="#5e6262" font-family="sans-serif, Inter" font-size="12" letter-spacing="1">DECENTRALIZED WORKFLOW CONTROL</text>
    
    <!-- Status lines -->
    <g transform="translate(0, 75)">
      <!-- Pulsing Online Light -->
      <circle cx="8" cy="-4" r="5" fill="#7affb4" class="g-glow pulse" />
      <text x="24" y="0" fill="#ffffff" font-family="monospace" font-size="12" font-weight="bold">SYSTEM STATUS: ACTIVE</text>
      
      <text x="0" y="22" fill="#5e6262" font-family="monospace" font-size="11">> FETCHING GITHUB ISSUE API...</text>
      <text x="0" y="38" fill="#5e6262" font-family="monospace" font-size="11">> PARSING USD/USDC/ETH REWARDS...</text>
      <text x="0" y="54" fill="#7affb4" font-family="monospace" font-size="11" class="pulse">> CRON NOTIFIER RUNNING (09:00 DAILY)</text>
      
      <!-- Terminal prompt cursor -->
      <text x="0" y="76" fill="#ffffff" font-family="monospace" font-size="12">> READY TO RESOLVE<tspan fill="#7affb4" class="blink">_</tspan></text>
    </g>
  </g>

  <!-- Vertical Divider -->
  <line x1="480" y1="20" x2="480" y2="240" stroke="#0a1a14" stroke-width="2" stroke-dasharray="4 4" />

  <!-- Radar Tracker (Right side) -->
  <!-- Center is at (660, 130) -->
  <g>
    <!-- Background Circle glows -->
    <circle cx="660" cy="130" r="100" fill="none" stroke="#0a1a14" stroke-width="1" />
    <circle cx="660" cy="130" r="70" fill="none" stroke="#0a1a14" stroke-width="1" />
    <circle cx="660" cy="130" r="40" fill="none" stroke="#0a1a14" stroke-width="1" />
    <circle cx="660" cy="130" r="10" fill="none" stroke="#0a1a14" stroke-width="1" />
    
    <!-- Crosshairs -->
    <line x1="550" y1="130" x2="770" y2="130" stroke="#052516" stroke-width="1" />
    <line x1="660" y1="20" x2="660" y2="240" stroke="#052516" stroke-width="1" />
    
    <!-- Rotating Sweep -->
    <g class="radar-sweep">
      <line x1="660" y1="130" x2="660" y2="30" stroke="#7affb4" stroke-width="2.5" class="g-glow" />
      <!-- Sweep trailing gradient wedge -->
      <path d="M 660,130 L 660,30 A 100,100 0 0,0 575,77 Z" fill="url(#sweep-gradient)" opacity="0.4" />
    </g>

    <!-- Radar Detections (bounties found!) -->
    <g class="bounty-node-1" transform="translate(716, 74)">
      <circle cx="0" cy="0" r="5" fill="#7affb4" class="g-glow-strong" />
      <circle cx="0" cy="0" r="10" fill="none" stroke="#7affb4" stroke-width="1" class="pulse" />
      <text x="12" y="4" fill="#ffffff" font-family="monospace" font-size="10" font-weight="bold">$500 USDC</text>
    </g>

    <g class="bounty-node-2" transform="translate(618, 172)">
      <circle cx="0" cy="0" r="5" fill="#7affb4" class="g-glow-strong" />
      <circle cx="0" cy="0" r="10" fill="none" stroke="#7affb4" stroke-width="1" class="pulse" />
      <text x="-70" y="4" fill="#ffffff" font-family="monospace" font-size="10" font-weight="bold">1.5 ETH</text>
    </g>

    <g class="bounty-node-3" transform="translate(596, 66)">
      <circle cx="0" cy="0" r="5" fill="#7affb4" class="g-glow-strong" />
      <circle cx="0" cy="0" r="10" fill="none" stroke="#7affb4" stroke-width="1" class="pulse" />
      <text x="-75" y="4" fill="#ffffff" font-family="monospace" font-size="10" font-weight="bold">$1,200 USD</text>
    </g>
  </g>

  <!-- Gradients -->
  <defs>
    <!-- Sweep gradient: starts full mint-whisper at sweep line and goes transparent counter-clockwise -->
    <linearGradient id="sweep-gradient" x1="100%" y1="0%" x2="0%" y2="50%">
      <stop offset="0%" stop-color="#7affb4" stop-opacity="1" />
      <stop offset="50%" stop-color="#7affb4" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#7affb4" stop-opacity="0" />
    </linearGradient>
  </defs>
</svg>
